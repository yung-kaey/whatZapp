<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>WhatzApp</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
    }

    body {
        background: #0b141a;
        height: 100vh;
        display: flex;
        overflow: hidden;
        transition: background 0.2s ease;
    }

    /* FULLSCREEN WALLPAPER LAYER (behind everything) */
    .wallpaper-layer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -2;
        background: #0b141a;
        transition: background-image 0.3s ease;
    }
/* Actual background image - full screen HD/4K ready */
    .wallpaper-img {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -1;
        pointer-events: none;
        transition: opacity 0.4s ease;
    }

    /* SIDEBAR */
    .sidebar {
        width: 30%;
        background: rgba(32, 44, 51, 0.92);
        backdrop-filter: blur(12px);
        color: white;
        border-right: 1px solid rgba(255,255,255,0.1);
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        z-index: 10;
    }

    .logo {
        padding: 20px;
        font-size: 28px;
        font-weight: bold;
        background: rgba(17, 27, 33, 0.85);
        backdrop-filter: blur(8px);
 color: #25d366;
        border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    #currentUserName {
        color: #e0e0e0;
        font-size: 13px;
        margin-top: 5px;
        font-weight: normal;
    }

    .search {
        padding: 10px;
    }

    .search input {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 28px;
        background: rgba(42, 57, 66, 0.8);
        color: white;
        outline: none;
        transition: 0.2s;
    }

    .search input:focus {
        background: rgba(42, 57, 66, 1);
        box-shadow: 0 0 0 2px #25d36640;
    }

    .chat-item {
        padding: 14px;
 border-bottom: 1px solid rgba(42, 57, 66, 0.6);
        cursor: pointer;
        display: flex;
        gap: 12px;
        align-items: center;
        transition: 0.2s;
    }

    .chat-item:hover {
        background: rgba(42, 57, 66, 0.7);
    }

    .avatar {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: #075e54;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
font-weight: bold;
        text-transform: uppercase;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    /* MAIN CHAT AREA - transparent to show full screen wallpaper */
    .main {
        width: 70%;
        display: flex;
        flex-direction: column;
        background: transparent;
        z-index: 5;
    }

    .topbar {
        background: rgba(32, 44, 51, 0.85);
        backdrop-filter: blur(12px);
        padding: 15px 20px;
        color: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .icons button {
        background: rgba(0,0,0,0.3);
        border: none;
        color: white;
        font-size: 22px;
        margin-left: 12px;
        cursor: pointer;
        width: 40px;
        height: 40px;
border-radius: 50%;
        transition: 0.2s;
    }

    .icons button:hover {
        background: #25d366;
        transform: scale(1.02);
    }

    /* MESSAGES CONTAINER - semi-transparent glassmorphism for readability */
    .messages {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        background: rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(3px);
    }

    .message {
        background: rgba(0, 92, 75, 0.9);
        color: white;
        padding: 10px 16px;
        border-radius: 18px;
        margin-bottom: 12px;
        max-width: 70%;
        word-wrap: break-word;
        box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        backdrop-filter: blur(2px);
    }

    .sent {
 align-self: flex-end;
        background: rgba(0, 168, 132, 0.9);
    }

    .status {
        font-size: 10px;
        margin-top: 5px;
        text-align: right;
        opacity: 0.8;
    }

    .input-area {
        display: flex;
        padding: 12px;
        background: rgba(32, 44, 51, 0.85);
        backdrop-filter: blur(12px);
        gap: 10px;
        border-top: 1px solid rgba(255,255,255,0.08);
    }

    .input-area input {
        flex: 1;
        padding: 12px 18px;
        border: none;
 border-radius: 30px;
        background: rgba(42, 57, 66, 0.9);
        color: white;
        font-size: 15px;
        outline: none;
    }

    .input-area button {
        border: none;
        padding: 0 24px;
        border-radius: 30px;
        background: #25d366;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
    }

    .input-area button:hover {
        background: #20b859;
        transform: scale(1.02);
    }

    /* AUTH SCREEN */
    .auth-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #0b141a;
        display: flex;
        justify-content: center;
align-items: center;
        z-index: 2000;
        backdrop-filter: blur(0px);
    }

    .auth-box {
        width: 380px;
        background: rgba(32, 44, 51, 0.96);
        backdrop-filter: blur(10px);
        padding: 32px;
        border-radius: 28px;
        border: 1px solid rgba(255,255,255,0.1);
        box-shadow: 0 20px 35px rgba(0,0,0,0.4);
    }

    /* CALL SCREEN */
    #callScreen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000000;
        display: none;
        z-index: 9999;
        flex-direction: row;
    }

    #localVideo, #remoteVideo {
        width: 50%;
        height: 100%;
        object-fit: cover;
        background: #1a1a1a;
 }

    #endCallBtn {
        position: absolute;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        border: none;
        width: 70px;
        height: 70px;
        border-radius: 50%;
        background: #e34f4f;
        color: white;
        font-size: 32px;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        transition: 0.2s;
    }

    #endCallBtn:hover {
        background: #c03939;
        transform: translateX(-50%) scale(1.05);
    }

    /* scrollbar */
    ::-webkit-scrollbar {
        width: 6px;
    }
    ::-webkit-scrollbar-track {
        background: #1e2a32;
    }
    ::-webkit-scrollbar-thumb {
        background: #25d366;
        border-radius: 8px;
    }
</style>
</head>
<body>

<!-- FULLSCREEN HD / 4K WALLPAPER SYSTEM (covers whole app) -->
<div class="wallpaper-layer" id="wallpaperLayer"></div>
<img id="fullscreenWallpaperImg" class="wallpaper-img" alt="wallpaper" style="opacity:0;">

<!-- AUTH MODAL -->
<div id="authScreen" class="auth-screen">
    <div class="auth-box">
        <h2 style="text-align:center;color:#25d366;margin-bottom:20px;">✨ WhatzApp ✨</h2>
        <input type="text" id="displayName" placeholder="Display Name" style="width:100%;padding:12px;margin:8px 0;background:#2a3942;border:none;color:white;border-radius:12px;">
:12px;">
        <input type="email" id="email" placeholder="Email" style="width:100%;padding:12px;margin:8px 0;background:#2a3942;border:none;color:white;border-radius:12px;">
        <input type="password" id="password" placeholder="Password" style="width:100%;padding:12px;margin:8px 0;background:#2a3942;border:none;color:white;border-radius:12px;">
        <button onclick="signUp()" style="width:100%;padding:14px;margin:15px 0 10px;background:#25d366;border:none;color:white;border-radius:40px;font-weight:bold;cursor:pointer;">Sign Up</button>
        <button onclick="login()" style="width:100%;padding:14px;background:#128c7e;border:none;color:white;border-radius:40px;font-weight:bold;cursor:pointer;">Login</button>
        <p id="authMessage" style="text-align:center;margin-top:12px;color:#ff8a7a;"></p>
    </div>
</div>
<!-- SIDEBAR -->
<div class="sidebar" id="sidebar" style="display:none;">
    <div class="logo">
        WhatzApp<span style="font-size:14px;">✨</span>
        <div id="currentUserName"></div>
    </div>
    <div class="search">
        <input type="text" id="searchUsersInput" placeholder="🔍 Search users...">
    </div>
    <div class="chat-list" id="chatList"></div>
</div>

<!-- MAIN CHAT -->
<div class="main" id="mainChat" style="display:none;">
    <div class="topbar">
        <h2 id="chatHeader">💬 Select a chat</h2>
        <div class="icons">
            <button onclick="voiceCall()" title="Voice Call">📞</button>
            <button onclick="videoCall()" title="Video Call">🎥</button>
            <button onclick="changeWallpaperHD()" title="Set HD/4K Wallpaper">🖼️</button>
            <button onclick="openSettings()" title="Settings">⚙️</button>
        </div>
</div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
        <input type="text" id="messageInput" placeholder="Type a message...">
        <button onclick="sendMessage()">Send ➤</button>
    </div>
</div>

<!-- CALL SCREEN -->
<div id="callScreen">
    <video id="localVideo" autoplay muted playsinline></video>
    <video id="remoteVideo" autoplay playsinline></video>
    <button id="endCallBtn" onclick="endCall()">📞</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script>
    // ---------- FIREBASE CONFIG ----------
    const firebaseConfig = {
        apiKey: "AIzaSyAcaYYoGanoGE6kHCOSgssZLG0QKfvsMyg",
        authDomain: "whatzapp-2903d.firebaseapp.com",
        databaseURL: "https://whatzapp-2903d-default-rtdb.firebaseio.com",
        projectId: "whatzapp-2903d",
        storageBucket: "whatzapp-2903d.firebasestorage.app",
        messagingSenderId: "681395977520",
        appId: "1:681395977520:web:e082951a5c9623ca69dcf5",
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
// GLOBALS
    let currentChatId = null;
    let messagesUnsubscribe = null;
    let peerConnection = null;
    let localStream = null;
    let currentOtherUser = null;

    // ---------- FULLSCREEN WALLPAPER (HD / 4K) ----------
    const wallpaperImg = document.getElementById('fullscreenWallpaperImg');
    const wallpaperLayer = document.getElementById('wallpaperLayer');

    function applyFullscreenWallpaper(url) {
        if (!url) {
            // reset to default gradient/dark
            wallpaperImg.style.opacity = '0';
            wallpaperLayer.style.background = '#0b141a';
            localStorage.removeItem('fullscreenWallpaper');
            return;
        }
        // Load image and set full screen HD/4K
        const img = new Image();
        img.onload = () => {
            wallpaperImg.src = url;
            wallpaperImg.style.opacity = '1';
            wallpaperLayer.style.background = 'transparent';
    localStorage.setItem('fullscreenWallpaper', url);
        };
        img.onerror = () => {
            alert('Invalid image URL. Please use a direct link to a high-res image (jpg/png).');
        };
        img.src = url;
    }

    // load saved wallpaper from localStorage
    const savedWall = localStorage.getItem('fullscreenWallpaper');
    if (savedWall && savedWall.trim() !== '') {
        const testImg = new Image();
        testImg.onload = () => {
            wallpaperImg.src = savedWall;
            wallpaperImg.style.opacity = '1';
            wallpaperLayer.style.background = 'transparent';
        };
        testImg.onerror = () => {
            localStorage.removeItem('fullscreenWallpaper');
            wallpaperImg.style.opacity = '0';
        };
        testImg.src = savedWall;
    } else {
        wallpaperImg.style.opacity = '0';
        wallpaperLayer.style.background = '#0b141a';
    }
  // HD WALLPAPER CHANGER (full app background, not just chat area)
    function changeWallpaperHD() {
        let url = prompt("🎨 PASTE HD / 4K WALLPAPER URL:\n(Use direct image link ending in .jpg, .png, .webp)\n\n✨ Fullscreen wallpaper will cover entire app including chat & sidebar!");
        if (url && url.trim()) {
            applyFullscreenWallpaper(url.trim());
        } else if (url === "") {
            // reset
            applyFullscreenWallpaper(null);
        }
    }

    // compatibility with old button (settings also uses HD wallpaper)
    window.changeWallpaper = changeWallpaperHD;

    // ---------- AUTH FUNCTIONS ----------
    async function signUp() {
        const displayName = document.getElementById('displayName').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        try {
const userCred = await auth.createUserWithEmailAndPassword(email, password);
            await userCred.user.updateProfile({ displayName });
            await db.collection("users").doc(userCred.user.uid).set({
                uid: userCred.user.uid,
                displayName: displayName || "User",
                email: email
            });
        } catch (err) {
            document.getElementById("authMessage").textContent = err.message;
        }
    }

    async function login() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        try {
            await auth.signInWithEmailAndPassword(email, password);
        } catch (err) {
            document.getElementById("authMessage").textContent = err.message;
        }
    }
 // ---------- AUTH STATE ----------
    auth.onAuthStateChanged(async user => {
        if (user) {
            document.getElementById("authScreen").style.display = "none";
            document.getElementById("sidebar").style.display = "flex";
            document.getElementById("mainChat").style.display = "flex";
            let display = user.displayName || user.email.split('@')[0];
            document.getElementById("currentUserName").textContent = `👤 ${display}`;
            await loadUsers();
            setupSearchFilter();
        }
    });
 // search filter
    function setupSearchFilter() {
        const searchInput = document.getElementById('searchUsersInput');
        if (searchInput) {
            searchInput.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                const items = document.querySelectorAll('.chat-item');
                items.forEach(item => {
                    const nameElem = item.querySelector('strong');
                    if (nameElem) {
                        const name = nameElem.innerText.toLowerCase();
                        item.style.display = name.includes(term) ? 'flex' : 'none';
                    }
                });
            });
        }
    }
// LOAD USERS (real-time dynamic with search)
    async function loadUsers() {
        const chatList = document.getElementById("chatList");
        chatList.innerHTML = "";
        const snapshot = await db.collection("users").get();
        const currentUid = auth.currentUser.uid;
        snapshot.forEach(doc => {
            const user = doc.data();
            if (user.uid === currentUid) return;
            const div = document.createElement("div");
            div.className = "chat-item";
            div.innerHTML = `
                <div class="avatar">${(user.displayName?.[0] || 'U').toUpperCase()}</div>
                <div><strong>${escapeHtml(user.displayName || "Anonymous")}</strong><br><small>${user.email || ''}</small></div>
            `;
            div.onclick = () => openChat(doc.id, user);
            chatList.appendChild(div);
        });
if (chatList.children.length === 0) {
            chatList.innerHTML = '<div style="padding:20px;text-align:center;color:#aaa;">✨ No other users yet. Invite friends!</div>';
        }
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
 // OPEN CHAT with realtime messages
    function openChat(otherUserId, otherUser) {
        currentOtherUser = otherUser;
        currentChatId = [auth.currentUser.uid, otherUserId].sort().join('_');
        document.getElementById("chatHeader").innerHTML = `${escapeHtml(otherUser.displayName || 'User')} <span style="font-size:12px;">💚</span>`;
        const messagesDiv = document.getElementById("messages");
        messagesDiv.innerHTML = "";
        if (messagesUnsubscribe) messagesUnsubscribe();
        messagesUnsubscribe = db.collection("chats").doc(currentChatId).collection("messages").orderBy("timestamp").onSnapshot(snapshot => {
            messagesDiv.innerHTML = "";
            snapshot.forEach(doc => {
const msg = doc.data();
                const div = document.createElement("div");
                div.className = "message " + (msg.sender === auth.currentUser.uid ? "sent" : "");
                div.innerHTML = `${escapeHtml(msg.text)}<div class="status">${msg.status || "✓"}</div>`;
                messagesDiv.appendChild(div);
            });
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        });
    }

    // SEND MESSAGE + notification
    async function sendMessage() {
        const input = document.getElementById("messageInput");
        const text = input.value.trim();
        if (!text || !currentChatId) return;
        await db.collection("chats").doc(currentChatId).collection("messages").add({
            sender: auth.currentUser.uid,
            text: text,
            type: "text",
status: "Sent",
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        if (Notification.permission === "granted" && currentOtherUser) {
            new Notification("📨 New message from " + auth.currentUser.displayName, { body: text });
        }
        input.value = "";
    }

    document.getElementById("messageInput")?.addEventListener("keypress", e => { if (e.key === "Enter") sendMessage(); });

    // SETTINGS (full wallpaper included)
    function openSettings() {
let choice = prompt(`⚙️ WHATZAPP SETTINGS ⚙️\n\n1 → Dark Mode (app background)\n2 → Light Mode (app background)\n3 → Change FULLSCREEN HD/4K Wallpaper\n4 → Reset Wallpaper to default`);
        if (choice === "1") {
            document.body.style.background = "#0b141a";
            wallpaperImg.style.opacity = "0";
            wallpaperLayer.style.background = "#0b141a";
            localStorage.removeItem('fullscreenWallpaper');
        } else if (choice === "2") {
            document.body.style.background = "#ece5dd";
            wallpaperImg.style.opacity = "0";
            wallpaperLayer.style.background = "#ece5dd";
            localStorage.removeItem('fullscreenWallpaper');
        } else if (choice === "3") {
            changeWallpaperHD();
        } else if (choice === "4") {
            applyFullscreenWallpaper(null);
            document.body.style.background = "#0b141a";
        }
    }
  // ---------- CALLING (WebRTC) basic P2P Demo ----------
    const configuration = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

    async function startCall(isVideo) {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: isVideo, audio: true });
            document.getElementById("callScreen").style.display = "flex";
            document.getElementById("localVideo").srcObject = localStream;
            peerConnection = new RTCPeerConnection(configuration);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
// For demo: no signaling server, just local preview + endcall functionality.
            // In production integrate with Firestore signaling. For simplicity, we offer UI to end call.
            alert("📞 Call started (Demo mode). Use End Call button to hang up. Full P2P requires signaling server.");
        } catch (err) {
            alert("Camera/Mic access error: " + err.message);
        }
    }

    function voiceCall() { startCall(false); }
    function videoCall() { startCall(true); }
    function endCall() {
if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
        if (peerConnection) { peerConnection.close(); peerConnection = null; }
        const callDiv = document.getElementById("callScreen");
        if (callDiv) callDiv.style.display = "none";
        if (document.getElementById("localVideo")) document.getElementById("localVideo").srcObject = null;
    }
 // Request notification permission
    Notification.requestPermission();

    // For refreshing chat list dynamic on new user signup (optional listener)
    auth.onAuthStateChanged(() => { if(auth.currentUser) loadUsers(); });
</script>
</body>
</html>
