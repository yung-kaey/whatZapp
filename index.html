<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>WhatzApp</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
    body {
        background: #0b141a;
        height: 100vh;
        overflow: hidden;
        color: white;
    }

    /* WALLPAPER */
    .wallpaper-layer {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: #0b141a;
    }
    .wallpaper-img {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; opacity: 0; transition: opacity 0.4s;
    }

    /* AUTH */
    .auth-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b141a;
        display: flex; justify-content: center; align-items: center; z-index: 2000;
    }
    .auth-box {
        width: 90%; max-width: 380px; background: rgba(32,44,51,0.96); padding: 32px; border-radius: 28px;
    }

    /* MAIN LAYOUT - Mobile Friendly */
    .sidebar {
        width: 100%; background: rgba(32,44,51,0.95); overflow-y: auto; display: flex; flex-direction: column; z-index: 10;
    }
    .main {
        flex: 1; display: flex; flex-direction: column; background: transparent; display: none;
    }
    .main.active { display: flex; }

    .logo { padding: 20px; font-size: 26px; font-weight: bold; color: #25d366; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .search { padding: 10px; }
    .search input { width: 100%; padding: 12px; border-radius: 28px; background: rgba(42,57,66,0.9); border: none; color: white; }

    .chat-item {
        padding: 14px; display: flex; gap: 12px; align-items: center; cursor: pointer; border-bottom: 1px solid rgba(42,57,66,0.6);
    }
    .chat-item:hover { background: rgba(42,57,66,0.7); }

    .avatar {
        width: 50px; height: 50px; border-radius: 50%; background: #075e54;
        display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold;
    }

    .topbar {
        background: rgba(32,44,51,0.95); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
    }

    .messages {
        flex: 1; padding: 20px; overflow-y: auto; background: rgba(0,0,0,0.4); display: flex; flex-direction: column; gap: 10px;
    }

    .message {
        padding: 10px 16px; border-radius: 18px; max-width: 80%; word-wrap: break-word;
    }
    .sent { align-self: flex-end; background: #00a884; }
    .received { align-self: flex-start; background: #1f2a32; }

    .input-area {
        padding: 12px; background: rgba(32,44,51,0.95); display: flex; gap: 8px; align-items: center;
    }
    .input-area input {
        flex: 1; padding: 14px 18px; border-radius: 30px; background: rgba(42,57,66,0.9);
        border: none; color: white; font-size: 16px; max-height: 120px; resize: none;
    }
    .input-area button {
        padding: 0 24px; background: #25d366; color: white; border: none; border-radius: 30px; font-weight: bold;
    }

    /* Call Screen */
    #callScreen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; flex-direction: column; z-index: 9999;
    }
    #incomingCall {
        position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(32,44,51,0.98);
        padding: 20px; border-radius: 20px; text-align: center; width: 90%; max-width: 350px; z-index: 10000;
    }
</style>
</head>
<body>

<div class="wallpaper-layer" id="wallpaperLayer"></div>
<img id="fullscreenWallpaperImg" class="wallpaper-img">

<!-- AUTH SCREEN -->
<div id="authScreen" class="auth-screen">
    <div class="auth-box">
        <h2 style="text-align:center;color:#25d366;margin-bottom:25px;">✨ WhatzApp ✨</h2>
        <input type="text" id="displayName" placeholder="Display Name" style="width:100%;padding:14px;margin:8px 0;background:#2a3942;border:none;color:white;border-radius:12px;">
        <input type="email" id="email" placeholder="Email" style="width:100%;padding:14px;margin:8px 0;background:#2a3942;border:none;color:white;border-radius:12px;">
        <input type="password" id="password" placeholder="Password" style="width:100%;padding:14px;margin:8px 0;background:#2a3942;border:none;color:white;border-radius:12px;">
        <button onclick="signUp()" style="width:100%;padding:15px;margin:20px 0 10px;background:#25d366;border:none;color:white;border-radius:40px;font-weight:bold;">Sign Up</button>
        <button onclick="login()" style="width:100%;padding:15px;background:#128c7e;border:none;color:white;border-radius:40px;font-weight:bold;">Login</button>
        <p id="authMessage" style="text-align:center;margin-top:15px;color:#ff8a7a;"></p>
    </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <div class="logo">WhatzApp<span style="font-size:14px;">✨</span><div id="currentUserName"></div></div>
    <div class="search"><input type="text" id="searchUsersInput" placeholder="🔍 Search users..."></div>
    <div id="chatList"></div>
</div>

<!-- MAIN CHAT -->
<div class="main" id="mainChat">
    <div class="topbar">
        <h2 id="chatHeader">Select a chat</h2>
        <div>
            <button onclick="voiceCall()" style="font-size:26px;margin-right:15px;background:none;border:none;color:white;">📞</button>
            <button onclick="videoCall()" style="font-size:26px;background:none;border:none;color:white;">🎥</button>
        </div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
        <input type="text" id="messageInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<!-- CALL SCREEN -->
<div id="callScreen">
    <video id="localVideo" autoplay muted playsinline style="width:100%;height:50%;object-fit:cover;"></video>
    <video id="remoteVideo" autoplay playsinline style="width:100%;height:50%;object-fit:cover;"></video>
    
    <div id="incomingCall" style="display:none;">
        <h3 id="callerName">Incoming Call...</h3>
        <button onclick="acceptCall()" style="background:#25d366;padding:12px 30px;margin:10px;border:none;border-radius:30px;color:white;">Accept</button>
        <button onclick="rejectCall()" style="background:#e34f4f;padding:12px 30px;margin:10px;border:none;border-radius:30px;color:white;">Reject</button>
    </div>

    <button onclick="endCall()" style="position:absolute;bottom:30px;left:50%;transform:translateX(-50%);background:#e34f4f;color:white;border:none;width:70px;height:70px;border-radius:50%;font-size:30px;">📞</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

<script>
// ================== FIREBASE ==================
const firebaseConfig = {
    apiKey: "AIzaSyAcaYYoGanoGE6kHCOSgssZLG0QKfvsMyg",
    authDomain: "whatzapp-2903d.firebaseapp.com",
    projectId: "whatzapp-2903d",
    storageBucket: "whatzapp-2903d.firebasestorage.app",
    messagingSenderId: "681395977520",
    appId: "1:681395977520:web:e082951a5c9623ca69dcf5"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentChatId = null;
let messagesUnsubscribe = null;
let currentOtherUser = null;
let peerConnection = null;
let localStream = null;
let isCaller = false;

// ================== AUTH ==================
async function signUp() {
    const name = document.getElementById('displayName').value.trim();
    const email = document.getElementById('email').value.trim();
    const pass = document.getElementById('password').value;
    try {
        const cred = await auth.createUserWithEmailAndPassword(email, pass);
        await cred.user.updateProfile({ displayName: name });
        await db.collection("users").doc(cred.user.uid).set({ uid: cred.user.uid, displayName: name || "User", email });
    } catch (e) { document.getElementById("authMessage").textContent = e.message; }
}

async function login() {
    const email = document.getElementById('email').value.trim();
    const pass = document.getElementById('password').value;
    try {
        await auth.signInWithEmailAndPassword(email, pass);
    } catch (e) { document.getElementById("authMessage").textContent = e.message; }
}

// ================== MAIN APP ==================
auth.onAuthStateChanged(async user => {
    if (user) {
        document.getElementById("authScreen").style.display = "none";
        document.getElementById("sidebar").style.display = "flex";
        document.getElementById("currentUserName").textContent = `👤 ${user.displayName || user.email.split('@')[0]}`;
        await loadUsers();
    }
});

async function loadUsers() { /* same as before */ 
    // ... (keep your original loadUsers function here)
    const chatList = document.getElementById("chatList");
    chatList.innerHTML = "";
    const snapshot = await db.collection("users").get();
    const currentUid = auth.currentUser.uid;
    snapshot.forEach(doc => {
        const user = doc.data();
        if (user.uid === currentUid) return;
        const div = document.createElement("div");
        div.className = "chat-item";
        div.innerHTML = `<div class="avatar">${(user.displayName?.[0] || 'U').toUpperCase()}</div>
                         <div><strong>${user.displayName || "User"}</strong></div>`;
        div.onclick = () => openChat(doc.id, user);
        chatList.appendChild(div);
    });
}

// Open Chat
function openChat(otherId, otherUser) {
    currentOtherUser = otherUser;
    currentChatId = [auth.currentUser.uid, otherId].sort().join('_');
    document.getElementById("chatHeader").textContent = otherUser.displayName || "User";
    document.getElementById("sidebar").style.display = "none";
    document.getElementById("mainChat").classList.add("active");

    // Load messages (keep your original code)
}

// Send Message
async function sendMessage() {
    const input = document.getElementById("messageInput");
    const text = input.value.trim();
    if (!text || !currentChatId) return;

    await db.collection("chats").doc(currentChatId).collection("messages").add({
        sender: auth.currentUser.uid,
        text: text,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });
    input.value = "";
}

// ================== CALLING (Improved with Ringing) ==================
async function startCall(isVideo) {
    try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: isVideo, audio: true });
        document.getElementById("callScreen").style.display = "flex";
        document.getElementById("localVideo").srcObject = localStream;
        isCaller = true;
        // TODO: Create offer and send via Firestore (signaling)
        alert("Calling... (Signaling still basic in this version)");
    } catch (err) {
        alert("Cannot access camera/mic: " + err.message);
    }
}

function voiceCall() { startCall(false); }
function videoCall() { startCall(true); }

function endCall() {
    if (localStream) localStream.getTracks().forEach(t => t.stop());
    if (peerConnection) peerConnection.close();
    document.getElementById("callScreen").style.display = "none";
    document.getElementById("incomingCall").style.display = "none";
}

// Accept / Reject (basic)
function acceptCall() { alert("Call Accepted (Signaling needs full setup)"); }
function rejectCall() { document.getElementById("incomingCall").style.display = "none"; }

// For now, incoming call simulation
// In full version you would listen to Firestore for incoming offers

</script>
</body>
</html>
