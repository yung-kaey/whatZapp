<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>WhatzApp</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
    }
    body {
        background: #0b141a;
        height: 100vh;
        display: flex;
        overflow: hidden;
    }

    /* FULLSCREEN WALLPAPER */
    .wallpaper-layer {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        z-index: -2;
        background: #0b141a;
    }
    .wallpaper-img {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        object-fit: cover;
        z-index: -1;
        opacity: 0;
        transition: opacity 0.4s;
    }

    /* On mobile, hide sidebar and show only chat */
    .sidebar {
        width: 100%;
        max-width: 350px;
        background: rgba(32, 44, 51, 0.95);
        color: white;
        overflow-y: auto;
        display: none;
        flex-direction: column;
        z-index: 10;
    }
    .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: transparent;
    }

    /* Mobile: Show sidebar as full screen when no chat is open */
    @media (max-width: 768px) {
        .sidebar { display: flex; width: 100%; }
        .main { display: none; }
        .main.active { display: flex; }
    }

    .logo {
        padding: 20px;
        font-size: 28px;
        font-weight: bold;
        color: #25d366;
        border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .search { padding: 10px; }
    .search input {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 28px;
        background: rgba(42, 57, 66, 0.9);
        color: white;
        outline: none;
    }

    .chat-item {
        padding: 14px;
        border-bottom: 1px solid rgba(42, 57, 66, 0.6);
        cursor: pointer;
        display: flex;
        gap: 12px;
        align-items: center;
    }
    .chat-item:hover { background: rgba(42, 57, 66, 0.7); }

    .avatar {
        width: 48px; height: 48px;
        border-radius: 50%;
        background: #075e54;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        font-weight: bold;
        text-transform: uppercase;
    }

    .topbar {
        background: rgba(32, 44, 51, 0.95);
        padding: 15px 20px;
        color: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .messages {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
        background: rgba(0, 0, 0, 0.4);
    }

    .message {
        background: rgba(0, 92, 75, 0.9);
        color: white;
        padding: 10px 16px;
        border-radius: 18px;
        margin-bottom: 12px;
        max-width: 80%;
        word-wrap: break-word;
    }
    .sent {
        align-self: flex-end;
        background: rgba(0, 168, 132, 0.9);
    }

    .input-area {
        display: flex;
        padding: 12px;
        background: rgba(32, 44, 51, 0.95);
        gap: 10px;
    }
    .input-area input {
        flex: 1;
        padding: 14px 18px;
        border: none;
        border-radius: 30px;
        background: rgba(42, 57, 66, 0.9);
        color: white;
        font-size: 16px;
    }
    .input-area button {
        padding: 0 24px;
        border-radius: 30px;
        background: #25d366;
        color: white;
        border: none;
        font-weight: bold;
        cursor: pointer;
    }

    .auth-screen {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: #0b141a;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 2000;
    }
    .auth-box {
        width: 90%;
        max-width: 380px;
        background: rgba(32, 44, 51, 0.96);
        padding: 32px;
        border-radius: 28px;
    }
</style>
</head>
<body>

<div class="wallpaper-layer" id="wallpaperLayer"></div>
<img id="fullscreenWallpaperImg" class="wallpaper-img" alt="wallpaper">

<!-- AUTH -->
<div id="authScreen" class="auth-screen">
    <div class="auth-box">
        <h2 style="text-align:center;color:#25d366;margin-bottom:20px;">✨ WhatzApp ✨</h2>
        <input type="text" id="displayName" placeholder="Display Name" style="width:100%;padding:12px;margin:8px 0;background:#2a3942;border:none;color:white;border-radius:12px;">
        <input type="email" id="email" placeholder="Email" style="width:100%;padding:12px;margin:8px 0;background:#2a3942;border:none;color:white;border-radius:12px;">
        <input type="password" id="password" placeholder="Password" style="width:100%;padding:12px;margin:8px 0;background:#2a3942;border:none;color:white;border-radius:12px;">
        <button onclick="signUp()" style="width:100%;padding:14px;margin:15px 0 10px;background:#25d366;border:none;color:white;border-radius:40px;font-weight:bold;cursor:pointer;">Sign Up</button>
        <button onclick="login()" style="width:100%;padding:14px;background:#128c7e;border:none;color:white;border-radius:40px;font-weight:bold;cursor:pointer;">Login</button>
        <p id="authMessage" style="text-align:center;margin-top:12px;color:#ff8a7a;"></p>
    </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <div class="logo">
        WhatzApp<span style="font-size:14px;">✨</span>
        <div id="currentUserName"></div>
    </div>
    <div class="search">
        <input type="text" id="searchUsersInput" placeholder="🔍 Search users...">
    </div>
    <div class="chat-list" id="chatList"></div>
</div>

<!-- MAIN CHAT -->
<div class="main" id="mainChat">
    <div class="topbar">
        <h2 id="chatHeader">💬 Select a chat</h2>
        <div>
            <button onclick="voiceCall()" style="background:none;border:none;color:white;font-size:24px;margin-right:10px;">📞</button>
            <button onclick="videoCall()" style="background:none;border:none;color:white;font-size:24px;margin-right:10px;">🎥</button>
        </div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
        <input type="text" id="messageInput" placeholder="Type a message...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>

    if (user) {
        document.getElementById("authScreen").style.display = "none";
        document.getElementById("sidebar").style.display = "flex";
        document.getElementById("mainChat").classList.add("active");

</body>
</html>
