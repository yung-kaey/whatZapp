<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WhatzApp</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
    body {
        background: #0b141a;
        height: 100vh;
        display: flex;
        overflow: hidden;
        color: white;
    }

    .wallpaper-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: #0b141a; }
    .wallpaper-img { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; opacity: 0; transition: opacity 0.4s; }

    .sidebar {
        width: 32%; min-width: 280px; background: rgba(32, 44, 51, 0.95); overflow-y: auto;
        display: flex; flex-direction: column; z-index: 10; border-right: 1px solid rgba(255,255,255,0.1);
    }
    .main { flex: 1; display: none; flex-direction: column; background: transparent; }
    .main.active { display: flex; }

    .logo { padding: 20px; font-size: 26px; font-weight: bold; color: #25d366; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .search { padding: 10px; }
    .search input { width: 100%; padding: 12px 16px; border: none; border-radius: 28px; background: rgba(42,57,66,0.9); color: white; }

    .chat-item { padding: 14px 20px; display: flex; gap: 12px; align-items: center; cursor: pointer; border-bottom: 1px solid rgba(42,57,66,0.6); }
    .chat-item:hover { background: rgba(42,57,66,0.7); }

    .avatar { width: 48px; height: 48px; border-radius: 50%; background: #075e54; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; }

    .topbar { background: rgba(32,44,51,0.95); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
    .messages { flex: 1; padding: 20px 15px; overflow-y: auto; background: rgba(0,0,0,0.4); display: flex; flex-direction: column; gap: 12px; }
    .message { padding: 10px 16px; border-radius: 18px; max-width: 78%; word-wrap: break-word; }
    .sent { align-self: flex-end; background: rgba(0,168,132,0.9); }
    .received { align-self: flex-start; background: rgba(31,42,50,0.95); }

    .input-area { padding: 12px 15px; background: rgba(32,44,51,0.95); display: flex; gap: 10px; border-top: 1px solid rgba(255,255,255,0.1); }
    .input-area input { flex: 1; padding: 14px 18px; border: none; border-radius: 30px; background: rgba(42,57,66,0.9); color: white; font-size: 16px; }
    .input-area button { padding: 0 26px; border-radius: 30px; background: #25d366; color: white; border: none; font-weight: bold; cursor: pointer; }

    .auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b141a; display: flex; justify-content: center; align-items: center; z-index: 2000; }
    .auth-box { width: 90%; max-width: 380px; background: rgba(32,44,51,0.96); padding: 32px; border-radius: 28px; }

    @media (max-width: 768px) {
        .sidebar { width: 100%; min-width: auto; }
        .main { display: none; }
        .main.active { display: flex; }
    }
</style>
</head>
<body>

<div class="wallpaper-layer" id="wallpaperLayer"></div>
<img id="fullscreenWallpaperImg" class="wallpaper-img" alt="wallpaper" style="opacity:0;">

<!-- AUTH -->
<div id="authScreen" class="auth-screen">
    <div class="auth-box">
        <h2 style="text-align:center;color:#25d366;margin-bottom:25px;">✨ WhatzApp ✨</h2>
        <input type="text" id="displayName" placeholder="Display Name" style="width:100%;padding:14px;margin:8px 0;background:#2a3942;border:none;color:white;border-radius:12px;">
        <input type="email" id="email" placeholder="Email" style="width:100%;padding:14px;margin:8px 0;background:#2a3942;border:none;color:white;border-radius:12px;">
        <input type="password" id="password" placeholder="Password" style="width:100%;padding:14px;margin:8px 0;background:#2a3942;border:none;color:white;border-radius:12px;">
        <button onclick="signUp()" style="width:100%;padding:15px;margin:20px 0 10px;background:#25d366;border:none;color:white;border-radius:40px;font-weight:bold;">Sign Up</button>
        <button onclick="login()" style="width:100%;padding:15px;background:#128c7e;border:none;color:white;border-radius:40px;font-weight:bold;">Login</button>
        <p id="authMessage" style="text-align:center;margin-top:15px;color:#ff8a7a;"></p>
    </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar" style="display:none;">
    <div class="logo">WhatzApp<span style="font-size:14px;">✨</span><div id="currentUserName"></div></div>
    <div class="search"><input type="text" id="searchUsersInput" placeholder="🔍 Search users..."></div>
    <div class="chat-list" id="chatList"></div>
</div>

<!-- MAIN CHAT -->
<div class="main" id="mainChat" style="display:none;">
    <div class="topbar">
        <h2 id="chatHeader">💬 Select a chat</h2>
        <div>
            <button onclick="changeWallpaperHD()" style="background:none;border:none;color:white;font-size:24px;margin-right:12px;">🖼️</button>
            <button onclick="voiceCall()" style="background:none;border:none;color:white;font-size:24px;margin-right:8px;">📞</button>
            <button onclick="videoCall()" style="background:none;border:none;color:white;font-size:24px;">🎥</button>
        </div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
        <input type="text" id="messageInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAcaYYoGanoGE6kHCOSgssZLG0QKfvsMyg",
    authDomain: "whatzapp-2903d.firebaseapp.com",
    projectId: "whatzapp-2903d",
    storageBucket: "whatzapp-2903d.firebasestorage.app",
    messagingSenderId: "681395977520",
    appId: "1:681395977520:web:e082951a5c9623ca69dcf5"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentChatId = null;
let messagesUnsubscribe = null;

auth.onAuthStateChanged(async user => {
    if (user) {
        document.getElementById("authScreen").style.display = "none";
        document.getElementById("sidebar").style.display = "flex";
        document.getElementById("mainChat").classList.add("active");
        document.getElementById("currentUserName").textContent = `👤 ${user.displayName || user.email.split('@')[0]}`;
        loadUsers();
    }
});

async function signUp() {
    const name = document.getElementById('displayName').value.trim();
    const email = document.getElementById('email').value.trim();
    const pass = document.getElementById('password').value;
    try {
        const cred = await auth.createUserWithEmailAndPassword(email, pass);
        await cred.user.updateProfile({ displayName: name });
        await db.collection("users").doc(cred.user.uid).set({ uid: cred.user.uid, displayName: name || "User", email });
        alert("Account created successfully!");
    } catch (e) {
        document.getElementById("authMessage").textContent = e.message;
    }
}

async function login() {
    const email = document.getElementById('email').value.trim();
    const pass = document.getElementById('password').value;
    try {
        await auth.signInWithEmailAndPassword(email, pass);
    } catch (e) {
        document.getElementById("authMessage").textContent = e.message;
    }
}

async function loadUsers() {
    const chatList = document.getElementById("chatList");
    chatList.innerHTML = "";
    const snapshot = await db.collection("users").get();
    const myUid = auth.currentUser.uid;
    snapshot.forEach(doc => {
        const user = doc.data();
        if (user.uid === myUid) return;
        const div = document.createElement("div");
        div.className = "chat-item";
        div.innerHTML = `<div class="avatar">${(user.displayName?.[0] || 'U').toUpperCase()}</div><div><strong>${user.displayName || "User"}</strong></div>`;
        div.onclick = () => openChat(doc.id, user);
        chatList.appendChild(div);
    });
}

function openChat(otherId, otherUser) {
    currentChatId = [auth.currentUser.uid, otherId].sort().join('_');
    document.getElementById("chatHeader").textContent = otherUser.displayName || "Chat";
    document.getElementById("messages").innerHTML = "";

    if (messagesUnsubscribe) messagesUnsubscribe();
    messagesUnsubscribe = db.collection("chats").doc(currentChatId).collection("messages")
        .orderBy("timestamp").onSnapshot(snapshot => {
            const div = document.getElementById("messages");
            div.innerHTML = "";
            snapshot.forEach(doc => {
                const msg = doc.data();
                const m = document.createElement("div");
                m.className = `message ${msg.sender === auth.currentUser.uid ? "sent" : "received"}`;
                m.textContent = msg.text;
                div.appendChild(m);
            });
            div.scrollTop = div.scrollHeight;
        });
}

async function sendMessage() {
    const input = document.getElementById("messageInput");
    const text = input.value.trim();
    if (!text || !currentChatId) return;
    await db.collection("chats").doc(currentChatId).collection("messages").add({
        sender: auth.currentUser.uid,
        text: text,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });
    input.value = "";
}

function changeWallpaperHD() {
    let url = prompt("Paste HD Wallpaper URL:");
    if (url) {
        document.getElementById("fullscreenWallpaperImg").src = url;
        document.getElementById("fullscreenWallpaperImg").style.opacity = "1";
    }
}

function voiceCall() { alert("Voice Call (Demo)"); }
function videoCall() { alert("Video Call (Demo)"); }
</script>
</body>
</html>
